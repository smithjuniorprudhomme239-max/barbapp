<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Premium barber shop - quality haircuts and grooming services." />
    <meta name="theme-color" content="#111111" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✂️</text></svg>" />
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Hs3801Hc/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="DuckensBarber" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>DuckensBarber - Premium Barbershop</title>
    <link rel="preload" href="https://i.postimg.cc/cHB0ht4b/Gemini-Generated-Image-8fy4xn8fy4xn8fy4.png" as="image" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        navigator.serviceWorker.register('/sw.js')
          .then(registration => {
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  if (confirm('A new version is available! Refresh to update?')) {
                    window.location.reload(true);
                  }
                }
              });
            });
            setInterval(() => {
              registration.update();
            }, 1000 * 60 * 60);
          });
      } else if ('serviceWorker' in navigator && !sessionStorage.getItem('sw-unregistered')) {
        navigator.serviceWorker.getRegistration('/sw.js').then(registration => {
          if (registration) {
            registration.unregister().then(() => {
              sessionStorage.setItem('sw-unregistered', '1');
              window.location.reload();
            });
          }
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
